<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&N Field Research | WeSchool Mumbai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        header { background: linear-gradient(to bottom, rgba(2, 6, 23, 0.9), transparent); backdrop-filter: blur(8px); }
        #navSidebar {
            transform: translateX(-100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(2, 6, 23, 0.98);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        #navSidebar.active { transform: translateX(0); }
        .hero-gradient {
            background: linear-gradient(rgba(2, 6, 23, 0.6), rgba(2, 6, 23, 0.85)), url('WeSchool.jpg');
            background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .page-view { display: none; opacity: 0; transform: translateY(20px); transition: all 0.5s ease; }
        .page-view.active { display: block; opacity: 1; transform: translateY(0); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .team-badge { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); padding: 4px 12px; border-radius: 99px; font-size: 0.75rem; color: #60a5fa; font-weight: 600; }
    </style>
</head>
<body>
    <header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 md:px-12 py-6">
        <button id="openMenu" class="bg-blue-600 text-white p-4 rounded-full shadow-lg hover:scale-110 transition-all">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
        <div class="text-right">
            <p class="text-[10px] font-bold tracking-[0.4em] text-blue-400 uppercase">WeSchool PG3 (25-27)</p>
            <p class="text-xs font-bold uppercase text-white">Field Study 2026</p>
        </div>
    </header>

    <aside id="navSidebar" class="fixed inset-y-0 left-0 z-[60] w-full md:w-[450px] p-12 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <h3 class="text-blue-500 font-bold uppercase tracking-widest text-[10px]">Directory</h3>
            <button id="closeMenu" class="text-slate-500 hover:text-white transition"><i data-lucide="x" class="w-8 h-8"></i></button>
        </div>
        <button id="goHome" class="flex items-center gap-4 text-3xl font-bold text-white hover:text-blue-500 transition-colors mb-12 group">
            <span class="bg-white/5 p-3 rounded-2xl group-hover:bg-blue-600 transition-all"><i data-lucide="home" class="w-6 h-6"></i></span> Back to Home
        </button>
        <nav id="menuContainer" class="space-y-8"></nav>
    </aside>

    <div id="landingView" class="page-view active">
        <section class="hero-gradient px-6 text-center">
            <div>
                <span class="mb-6 px-4 py-2 rounded-full border border-blue-500/30 bg-blue-500/10 text-blue-400 text-[10px] font-bold uppercase tracking-[0.3em] backdrop-blur-md">Welingkar Mumbai Campus</span>
                <h1 class="text-6xl md:text-9xl font-black mb-8 leading-[0.85] tracking-tighter text-white">Selling & Negotiation <br><span class="text-blue-500 italic font-light">DYNAMICS</span></h1>
                <p class="text-slate-200 text-lg md:text-xl max-w-2xl mx-auto mb-12 font-light drop-shadow-lg">An experiential deep-dive into the selling and negotiation landscapes of Mumbai.</p>
                <button onclick="document.getElementById('openMenu').click()" class="bg-blue-600 text-white px-12 py-5 font-bold uppercase tracking-widest hover:bg-blue-700 transition-all rounded-full shadow-2xl shadow-blue-500/40">Explore The Study</button>
            </div>
        </section>
        </div>

    <main id="reportView" class="page-view pt-32 pb-40 px-6">
        <div class="max-w-7xl mx-auto">
            <div id="reportHeader" class="mb-10"></div>
            <div id="teamSection" class="mb-10 flex flex-wrap gap-3"></div>
            <div id="reportGrid" class="grid lg:grid-cols-2 gap-8"></div>
        </div>
    </main>

    <script>
        const siteData = {
            'Dadar Market': { 
                theory: 'Distributive Bargaining', 
                groups: { 
                    1: { team: ['Sushant Ghadge (37)', 'Yash Savla (31)'], obs: ['High intensity footfall creates urgency', 'Aggressive price anchoring starts 50% high', 'Crowded environment reduces thinking time'], tactics: ['Extreme high-ball initial pricing', 'Emotional appeals ("Bohni" deals)'] },
                    2: { team: ['Aditya (01)', 'Bhavya (05)'], obs: ['Strong focus on female demographic needs', 'Seasonal trends drive inventory'], tactics: ['Mirroring buyer enthusiasm', 'Family-oriented persuasion'] },
                    3: { team: ['Gaurav (14)', 'Hina (16)'], obs: ['Ethnic wear dominance in specific lanes', 'Buyer silence used as weapon'], tactics: ['Flattery based on style', 'Using regional language for trust'] },
                    4: { team: ['Manas (22)', 'Nia (23)'], obs: ['Price shifts based on buyer attire', 'Ignored low-ball offers'], tactics: ['Visual anchoring via tags', 'The "Final offer" ultimatum'] },
                    5: { team: ['Sana (28)', 'Tanmay (29)'], obs: ['Utility focus over brand', 'Impact of transit passengers'], tactics: ['Volume-based pricing', 'Physical stress tests'] },
                    6: { team: ['Yash (35)', 'Zaid (36)'], obs: ['High visual saturation of colors', 'Buyer FOMO tactics'], tactics: ['Social proof claims', 'Bundled "Combo" deals'] },
                    7: { team: ['Ekta (38)', 'Faizan (39)'], obs: ['Closing based on buyer mood', 'Evening lighting texture perception'], tactics: ['Add-on surprise at final payment', 'Validating negotiation skill'] }
                } 
            },
            'Sion Leather Market': { 
                theory: 'Value-Based Selling', 
                groups: { 
                    1: { team: ['Group 1 Members'], obs: ['Deep product knowledge is primary tool', 'Leather grade focus'], tactics: ['Burn tests for authenticity', 'Longevity education'] },
                    2: { team: ['Group 2 Members'], obs: ['Win-win mindset observed', 'Handmade vs Machine focus'], tactics: ['Educational storytelling', 'Workshop-direct savings'] },
                    3: { team: ['Group 3 Members'], obs: ['Narrative-driven sales pitches', 'Longevity focus'], tactics: ['Visual stitching demos', 'Exclusive "One-piece" pitch'] },
                    4: { team: ['Group 4 Members'], obs: ['Quality certification tool', 'Export-quality claims'], tactics: ['Material stress tests', 'Tiered hide pricing'] },
                    5: { team: ['Group 5 Members'], obs: ['Utility over fashion focus', 'Zippery/Hardware focus'], tactics: ['Demonstrating seam strength', 'Repair service offers'] },
                    6: { team: ['Group 6 Members'], obs: ['Bespoke manufacturing focus', 'Small batch production'], tactics: ['Design consultations', 'Artisanal branding'] },
                    7: { team: ['Group 7 Members'], obs: ['Grade variation as anchor', 'Seasonal demand (jackets)'], tactics: ['Premium Grade A anchoring', 'Expedited production times'] }
                } 
            },
            'Masjid Bandar': { 
                theory: 'Integrative Negotiation', 
                groups: { 
                    1: { team: ['Group 1 Members'], obs: ['Analytical volume-based deals', 'Logistics focus'], tactics: ['Tiered bulk weight pricing', 'Long-term contracts'] },
                    2: { team: ['Group 2 Members'], obs: ['Price locks and futures', 'Margin psychology'], tactics: ['Credit terms for loyalty', 'Freight cost negotiation'] },
                    3: { team: ['Group 3 Members'], obs: ['Trade agent middlemen role', 'Sample quality focus'], tactics: ['Sampling highest grade first', 'Supply scarcity info'] },
                    4: { team: ['Group 4 Members'], obs: ['Formalizing informal deals', 'Turnover speed focus'], tactics: ['Consistent supply assurance', 'Market rate anchoring'] },
                    5: { team: ['Group 5 Members'], obs: ['Creditworthiness as lever', 'Warehouse proximity'], tactics: ['Flexible credit cycles', 'Bulk storage solutions'] },
                    6: { team: ['Group 6 Members'], obs: ['Supply stability focus', 'Trust over minor losses'], tactics: ['Partner narrative building', 'Absorbing price hikes'] },
                    7: { team: ['Group 7 Members'], obs: ['Network procurement edge', 'Currency import impact'], tactics: ['Family-run trust leverage', 'Shortage supply assurance'] }
                } 
            },
            'Inorbit Mall': { 
                theory: 'Consultative Retail', 
                groups: { 
                    1: { team: ['Group 1 Members'], obs: ['Fixed-price environment', 'Consultative staff'], tactics: ['Cross-selling accessories', 'Upselling premium versions'] },
                    2: { team: ['Group 2 Members'], obs: ['Digital tools in sales', 'Warranty reliance'], tactics: ['Value-pack bundling', 'Membership recruitment'] },
                    3: { team: ['Group 3 Members'], obs: ['High-margin floor pathing', 'VIP tier service'], tactics: ['Exclusivity membership', 'Personal shopper help'] },
                    4: { team: ['Group 4 Members'], obs: ['Red-tag psychological impact', 'Gift-with-purchase'], tactics: ['Buy 2 Get 1 psychology', 'Free gift thresholds'] },
                    5: { team: ['Group 5 Members'], obs: ['Lighting focus guidance', 'Dwell time air-con impact'], tactics: ['Strategic product placement', 'Celebrity endorsements'] },
                    6: { team: ['Group 6 Members'], obs: ['Loyalty program effectiveness', 'Standardized protocols'], tactics: ['Tiered rewards systems', 'Pre-order next season'] },
                    7: { team: ['Group 7 Members'], obs: ['Returns as risk reverser', 'Packaging perception'], tactics: ['No-questions returns', 'Premium gift wrapping'] }
                } 
            }
        };

        const App = {
            init() { this.buildNav(); this.bindEvents(); lucide.createIcons(); },
            bindEvents() {
                const sidebar = document.getElementById('navSidebar');
                document.getElementById('openMenu').addEventListener('click', () => sidebar.classList.add('active'));
                document.getElementById('closeMenu').addEventListener('click', () => sidebar.classList.remove('active'));
                document.getElementById('goHome').addEventListener('click', () => {
                    document.getElementById('landingView').style.display = 'block';
                    document.getElementById('reportView').classList.remove('active');
                    sidebar.classList.remove('active');
                });
            },
            buildNav() {
                const container = document.getElementById('menuContainer');
                Object.keys(siteData).forEach(loc => {
                    const safeId = loc.replace(/\s+/g, '');
                    const subLinks = [1,2,3,4,5,6,7].map(g => `<button onclick="App.render('${loc}', ${g})" class="block w-full text-left py-2 hover:text-white transition-all">Group ${g} Report</button>`).join('');
                    container.innerHTML += `<div class="border-b border-white/5 pb-6"><button class="menu-toggle text-3xl font-bold flex items-center justify-between w-full hover:text-blue-500 text-white transition-all" data-target="sub-${safeId}">${loc} <i data-lucide="chevron-down" class="w-6 h-6"></i></button><div id="sub-${safeId}" class="hidden pl-8 mt-4 space-y-3 text-xl text-slate-400 border-l border-blue-600/30">${subLinks}</div></div>`;
                });
                document.querySelectorAll('.menu-toggle').forEach(btn => btn.addEventListener('click', () => document.getElementById(btn.dataset.target).classList.toggle('hidden')));
            },
            render(market, groupNum) {
                document.getElementById('landingView').style.display = 'none';
                const view = document.getElementById('reportView');
                view.classList.add('active');
                document.getElementById('navSidebar').classList.remove('active');
                const gData = siteData[market].groups[groupNum];
                document.getElementById('reportHeader').innerHTML = `<div class="bg-blue-600 p-12 rounded-[40px] shadow-2xl"><h2 class="text-4xl font-black mb-2 text-white">${market}</h2><p class="text-lg italic text-blue-100">Group ${groupNum} • ${siteData[market].theory}</p></div>`;
                document.getElementById('teamSection').innerHTML = `<span class="text-xs uppercase tracking-widest text-slate-500 w-full mb-2">Team Members:</span>` + gData.team.map(name => `<span class="team-badge">${name}</span>`).join('');
                document.getElementById('reportGrid').innerHTML = `<div class="glass-panel p-10 rounded-[40px]"><h3 class="text-2xl font-bold mb-6 text-white">Observations</h3><ul class="space-y-4 text-slate-400 text-md">${gData.obs.map(p => `<li>• ${p}</li>`).join('')}</ul></div><div class="glass-panel p-10 rounded-[40px]"><h3 class="text-2xl font-bold mb-6 text-white">Tactics</h3><ul class="space-y-4 text-slate-400 text-md">${gData.tactics.map(p => `<li>• ${p}</li>`).join('')}</ul></div>`;
                lucide.createIcons();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };
        App.init();
    </script>
</body>
</html>
